];
var AG=[
  {id:1,n:"The Name Rememberer",e:"🤝",t:"10:00 AM",ph:"morning",d:'After envelopes open: approach 2 guests separately, shake hand firmly, say "Great to officially meet you. I\'m [name]." Completely seriously, even if you\'ve known them for years.'},
  {id:2,n:"The Unsolicited Scorekeeper",e:"📋",t:"10:30 AM",ph:"morning",d:'During any group activity, announce you\'re "keeping official score." Read standings aloud exactly twice. Numbers don\'t need to be accurate.'},

var TM={};
function gTM(id,tot){if(!TM[id])TM[id]={s:tot,tot:tot,run:false,done:false,iv:null};return TM[id];}
function tickT(id){var t=TM[id];t.s--;if(t.s<=0){t.s=0;t.run=false;t.done=true;clearInterval(t.iv);t.iv=null;}updT(id);}
function togT(id,tot){var t=gTM(id,tot);if(t.done)return;if(t.run){clearInterval(t.iv);t.iv=null;t.run=false;}else{t.run=true;t.iv=setInterval(function(){tickT(id);},1000);}updT(id);}
function rstT(id,tot){var t=gTM(id,tot);clearInterval(t.iv);t.iv=null;t.s=tot;t.run=false;t.done=false;updT(id);}
function updT(id){
  var t=TM[id],el=document.getElementById("tm"+id);if(!el)return;
  var m=String(Math.floor(t.s/60)).padStart(2,"0"),s=String(t.s%60).padStart(2,"0");
  el.querySelector(".td").textContent=m+":"+s;
  el.querySelector(".td").className="td"+(t.done?" d":t.run?" r":"");
  el.querySelector(".tm").style.display=t.done?"block":"none";
  var b=el.querySelector(".ts");b.textContent=t.run?"PAUSE":t.done?"DONE":"START";
  b.className="ts"+(t.run?" r":"");
}
function tmH(id,tot){
  var t=gTM(id,tot),m=String(Math.floor(t.s/60)).padStart(2,"0"),s=String(t.s%60).padStart(2,"0");
  var lbl=tot>=600?"10-Minute Deliberation":"30-Second Defense";
  return'<div class="card" style="background:#0D0D0D" id="tm'+id+'"><div class="tw"><div class="tl">'+lbl+'</div><div class="td">'+(m+":"+s)+'</div><div class="tm">⏰ TIME\'S UP — SILENCE!</div><div class="tbtns"><button class="ts" onclick="togT(\''+id+'\','+tot+')">START</button><button class="tr" onclick="rstT(\''+id+'\','+tot+')">Reset</button></div></div></div>';
}
function updH(){var a=act();document.getElementById("hsub").textContent="Host Control · "+a.length+" active / "+S.elim.length+" eliminated";}

  updH();var c=document.getElementById("content");

    h+='<select class="selw" onchange="setTgt(this.value)"><option value="">— Select Millionaire\'s target —</option>'+a.map(function(p){return'<option value="'+p+'"'+(VD.tgt===p?" selected":"")+'>'+p+'</option>';}).join('')+'</select>';
    if(VD.succ===false&&VD.tgt)h+='<div class="mn" style="color:#C9A84C">⚠ Ghost Penalty: +'+pen+' vote(s) added to '+VD.tgt+'</div>';
    if(VD.succ===true&&VD.tgt)h+='<div class="mn" style="color:#27AE60">⭐ Double ballot: +1 extra vote for '+VD.tgt+'</div>';
  }
  h+='</div><div class="card" style="margin-bottom:8px"><div style="font-size:11px;color:#888;letter-spacing:1px;margin-bottom:10px">BALLOT COUNTS (raw totals from slips)</div>'+a.map(function(p){return'<div class="row" style="margin-bottom:6px"><span style="flex:1;font-size:13px">'+p+'</span><input class="vi" type="number" min="0" placeholder="0" value="'+(VD.votes[p]||"")+'" oninput="setV(\''+p+'\',this.value)"/></div>';}).join('')+'</div>';
  h+='<button class="btn-tally" onclick="calcT()">CALCULATE FINAL TALLY</button>';
  if(VD.result){
    h+='<div class="card rc" style="margin-top:8px"><div style="font-size:11px;color:#888;letter-spacing:1px;margin-bottom:10px">RESULTS (with modifiers)</div>'+
    VD.result.map(function(rv,i){var n=rv[0],tot=rv[1],t0=i===0,t1=i===1&&!isL,rc=t0?"#C0392B":t1?"#C9A84C":"#888";
      return'<div class="rrow"><span class="rrank" style="color:'+rc+'">'+(i+1)+'.</span><span class="rname">'+n+'</span><span class="rtot" style="color:'+(t0?"#C0392B":"#CCC")+'">'+tot+'</span>'+((t0||t1)?'<button class="btn-elim" onclick="elimP(\''+n+'\');rr()">ELIM</button>':'')+'</div>';
    }).join('')+'</div>';
  }
  return h;
}
function calcT(){
  var a=act(),isL=S.vp==="lunch",tot={};
  a.forEach(function(p){tot[p]=parseInt(VD.votes[p])||0;});
  if(VD.succ===true&&VD.tgt)tot[VD.tgt]=(tot[VD.tgt]||0)+1;
  if(VD.succ===false&&VD.tgt)tot[VD.tgt]=(tot[VD.tgt]||0)+(isL?1:3);
  VD.result=Object.entries(tot).sort(function(a,b){return b[1]-a[1];});rr();
}
function setM(v){VD.succ=v;rr();}
function setTgt(v){VD.tgt=v;rr();}
function setV(p,v){VD.votes[p]=Math.max(0,parseInt(v)||0);}
function setVP(p){S.vp=p;VD.result=null;rr();}
function rAg(){
  var a=act(),h='<div class="info">TAP TO EXPAND  •  ASSIGN & TRACK</div>';
  AG.forEach(function(ag){
    var open=S.agO===ag.id,asgn=S.assign[ag.id]||"",dn=S.done[ag.id]||false,col=PC[ag.ph]||"#2A2A2A",body="";
    if(open)body='<div class="ag-body"><div style="font-size:12px;color:#CCC;line-height:1.6">'+ag.d+'</div><div class="row"><select class="sel" onchange="asgA('+ag.id+',this.value)"><option value="">Assign to player…</option>'+a.map(function(p){return'<option value="'+p+'"'+(asgn===p?" selected":"")+'>'+p+'</option>';}).join('')+'</select><button class="'+(dn?"btn-undone":"btn-done")+'" onclick="togD('+ag.id+')">'+(dn?"Unmark":"✔ Done")+'</button></div></div>';
    h+='<div class="ag-row" style="border:1px solid '+(dn?"#27AE60":open?col:"#2A2A2A")+';border-left:3px solid '+col+';opacity:'+(dn?.7:1)+'"><div class="ag-hdr" onclick="togA('+ag.id+')"><span style="font-size:18px">'+ag.e+'</span><div style="flex:1"><div style="font-size:12px;font-weight:700;color:'+(dn?"#27AE60":"#F0EBE0")+'">#'+ag.id+' '+ag.n+'</div><div style="font-size:10px;color:#888;margin-top:1px">'+ag.t+(asgn?" · "+asgn:"")+'</div></div>'+(dn?'<span class="tag tgr">✔ Done</span>':'')+'<span style="color:#888;font-size:11px;margin-left:4px">'+(open?"▲":"▼")+'</span></div>'+body+'</div>';
  });
  return h;
}
function rSc(){
  return SCH.filter(function(e){return e.sc;}).map(function(ev,i){
    var col=PC[ev.ph]||"#2A2A2A",open=S.scO===i;
    return'<div class="erow" style="border-left:3px solid '+col+(open?";border-color:"+col:"")+'" onclick="togSc('+i+')"><div class="ehdr"><span class="etime" style="color:'+col+'">'+ev.t+'</span><span class="elbl">'+ev.l+'</span><span style="color:#888;font-size:12px">'+(open?"▲":"▼")+'</span></div>'+(open?'<div style="border-top:1px solid #2A2A2A;padding:14px;font-size:13px;color:#F0EBE0;line-height:1.75;white-space:pre-line;background:#141414">'+ev.sc+'</div>':'')+'</div>';
  }).join('');
}
function togS(i){S.schO=S.schO===i?null:i;rr();}
function togA(id){S.agO=S.agO===id?null:id;rr();}
function togSc(i){S.scO=S.scO===i?null:i;rr();}
function elimP(p){if(S.elim.indexOf(p)<0)S.elim.push(p);persist();rr();}
function rstP(p){S.elim=S.elim.filter(function(x){return x!==p;});persist();rr();}
function togE(){S.editing=!S.editing;S.showRst=false;rr();}
function saveN(){S.players=Array.from({length:9},function(_,i){var el=document.getElementById("ni"+i);return(el?el.value.trim():"")||("Player "+(i+1));});S.editing=false;persist();rr();}
function shRst(){S.showRst=true;S.editing=false;rr();}
function noRst(){S.showRst=false;rr();}
function doRst(){S.players=IP.slice();S.elim=[];S.assign={};S.done={};S.showRst=false;S.editing=false;VD={succ:null,tgt:"",votes:{},result:null};persist();rr();}
function asgA(id,p){S.assign[id]=p;persist();rr();}
function togD(id){S.done[id]=!S.done[id];persist();rr();}
function openV(ph){S.vp=ph;VD.result=null;showTab("vt");}
rr();
</script>
</body>
</html>
